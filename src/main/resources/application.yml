spring:
  application:
    name: inventory
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  ai:
    mcp:
      server:
        protocol: STREAMABLE
        streamable-http:
          mcp-endpoint: /mcp
        type: SYNC
        annotation-scanner:
          enabled: true
    model:
      chat: google-genai
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: ${LLM_DEFAULT_MODEL:gemini-2.5-flash}
            temperature: ${LLM_FLASH_TEMPERATURE:0.2}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  elasticsearch:
    uris: ${ES_URL}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: [profile, email]
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
    prometheus:
      enabled: true
      health:
        show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        chat.queue.wait: true
        chat.worker.processing: true
        chat.llm.duration: true
      percentiles:
        chat.queue.wait: 0.5,0.95
        chat.worker.processing: 0.5,0.95
        chat.llm.duration: 0.5,0.95

springdoc:
  api-docs:
    version: openapi_3_0
  swagger-ui:
    url: /v3/api-docs

jwt:
  secret: ${JWT_SECRET}
  access-exp: ${JWT_ACCESS_EXP}
  refresh-exp: ${JWT_REFRESH_EXP}

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET}
    region:
      static: ap-northeast-2
    credentials:
      use-default: true
    stack:
      auto: false

nts:
  api:
    url: https://api.odcloud.kr/api/nts-businessman/v1
    key: ${NTS_API_KEY}
    connect-timeout: 3000
    read-timeout: 5000

llm:
  provider: gemini
  model: gemini-2.5-flash
  flash-model: gemini-2.5-flash
  reasoning-model: gemini-2.5-pro
  review-model: gemini-2.5-flash
  flash-temperature: 0.2
  reasoning-temperature: 0.1
  review-temperature: 0.1
  flash-thinking-budget: 0
  reasoning-thinking-budget: 2048
  flash-max-output-tokens: 4096
  reasoning-max-output-tokens: 8192
  review-max-output-tokens: 4096
  review-enabled: true
  review-min-answer-length: 220
  gemini:
    api-key: ${GEMINI_API_KEY}
    base-url: https://generativelanguage.googleapis.com/v1beta

gemini:
  api:
    key: ${GEMINI_API_KEY}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

chat:
  stream:
    key: chat:user-message
    consumer-group: chat-llm-group
    consumer-name: ${spring.application.name:inventory}-${HOSTNAME:${random.uuid}}
    poll-count: 10
    poll-block-seconds: 2
    poll-fixed-delay-ms: 1000
    min-workers: 1
    max-workers: 2
    scale-check-fixed-delay-ms: 1000
    scale-down-idle-seconds: 15